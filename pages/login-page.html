<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../style/greet-file.css" />
    <link rel="stylesheet" href="../style/login.css" />
    <title>login-page</title>
  </head>
  <body>
    <div class="parent">
      <!--start hello animation-->
      <div class="hello">
        <span>H</span>
        <span>e</span>
        <span>l</span>
        <span>l</span>
        <span>o</span>
      </div>
      <!--end hello animation-->
      <!--start login card-->
      <div class="login">
        <h2>login</h2>
        <form action="" method="post" accept-charset="utf-8">
          <div class="input">
            <div class="combo">
              <input type="email" name="login" id="email" />
              <label for="email">write your email</label>
            </div>
            <div class="combo">
              <input type="password" name="login" id="password" />
              <label for="password">write your password</label>
            </div>
          </div>
          <button class="btn" type="submit">login</button>
          <button class="btn" type="submit">create new account</button>
        </form>
      </div>
     <!--end login card-->
    </div>
  </body>
</html>
